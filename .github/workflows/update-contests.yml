name: Update Contest Data

on:
  schedule:
    - cron: '0 1,13 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: python -m pip install requests

      - name: Fetch contest and practice data
        run: python fetch_contests.py

      - name: Commit changes
        uses: EndBug/add-and-commit@v9
        with:
          add: 'public/assets/data/*.json'
          message: 'Update Codeforces data'
          default_author: github_actions
