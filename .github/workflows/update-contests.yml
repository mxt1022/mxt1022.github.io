name: 更新竞赛数据并部署站点

on:
  schedule:
    - cron: '0 1,13 * * *'
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 安装依赖
        run: |
          pip install requests mkdocs mkdocs-material   # 如果有其他主题也装上

      - name: 运行爬虫（生成 docs/contests.json）
        run: python fetch_contests.py

      - name: 构建 MkDocs 站点
        run: mkdocs build --site-dir public   # 输出到 public 目录

      - name: 上传 Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - name: 部署到 GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
